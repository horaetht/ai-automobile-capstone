<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnosis Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Diagnosis Result</h1>

        <p><strong>Input symptom:</strong> {{ symptom }}</p>
        <p><strong>Possible issue:</strong> {{ result.possible_issue }}</p>
        <p><strong>Urgency:</strong> {{ result.urgency }}</p>
        <p><strong>Recommended next step:</strong> {{ result.recommended_next_step }}</p>

        <a href="/">Try another symptom</a>
    </div>
</body>
</html>
